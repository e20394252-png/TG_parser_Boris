version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: telegram_parser_db
    environment:
      POSTGRES_DB: telegram_parser
      POSTGRES_USER: parser_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - parser_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U parser_user -d telegram_parser" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telegram_parser_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    ports:
      - "6379:6379"
    networks:
      - parser_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telegram_parser_backend
    environment:
      DATABASE_URL: postgresql://parser_user:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/telegram_parser
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_change_me}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
      - telegram_sessions:/app/sessions
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - parser_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telegram_parser_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - parser_network
    restart: unless-stopped

volumes:
  postgres_data:
  telegram_sessions:


networks:
  parser_network:
    driver: bridge
